name: Run Postgres script

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Pull repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Start PostgreSQL
      - name: Start database
        run: |
          docker compose up -d

      # Wait for PostgreSQL
      - name: Wait for PostgreSQL
        run: |
          until docker exec mydb pg_isready -U postgres; do
            echo "Waiting for database..."
            sleep 2
          done

      # Make script executable
      - name: Make script executable
        run: chmod +x run-postgres.sh

      # Run your script
      - name: Run script
        run: ./run-postgres.sh

      # Set up kubernetes
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.27.3"

      # Config kubernetes
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # Deploy
      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f k8s/deployment.yaml

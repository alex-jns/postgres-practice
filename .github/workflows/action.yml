jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Pull repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Start PostgreSQL
      - name: Start database
        run: |
          docker compose up -d

      # Wait for PostgreSQL
      - name: Wait for PostgreSQL
        run: |
          until docker exec mydb pg_isready -U postgres; do
            echo "Waiting for database..."
            sleep 2
          done

      # Make script executable
      - name: Make script executable
        run: chmod +x script.sh

      # Run your script
      - name: Run script
        run: ./run-postgres.sh
